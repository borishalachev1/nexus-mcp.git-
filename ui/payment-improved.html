<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Signature Request</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --mm-blue: #0376C9;
            --mm-blue-hover: #0260a4;
            --mm-text: #24272A;
            --mm-text-muted: #535A61;
            --mm-border: #D6D9DC;
            --mm-bg: #FFFFFF;
            --mm-bg-hover: #F2F4F6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            color: var(--mm-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .mm-window {
            background: var(--mm-bg);
            width: 360px;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--mm-border);
        }

        /* Header */
        .mm-header {
            padding: 16px;
            border-bottom: 1px solid var(--mm-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .mm-network-badge {
            display: flex;
            align-items: center;
            background: var(--mm-bg-hover);
            padding: 4px 8px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--mm-border);
        }

        .network-dot {
            width: 8px;
            height: 8px;
            background: #00d395;
            border-radius: 50%;
            margin-right: 6px;
        }

        /* Account Info */
        .mm-account-section {
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid var(--mm-border);
        }

        .identicon {
            width: 48px;
            height: 48px;
            background: linear-gradient(45deg, #0376C9, #00d395);
            border-radius: 50%;
            margin-bottom: 8px;
            border: 2px solid white;
            box-shadow: 0 0 0 1px var(--mm-border);
        }

        .account-label {
            font-size: 14px;
            font-weight: 600;
        }

        .account-address {
            font-size: 12px;
            color: var(--mm-text-muted);
        }

        /* Content Area */
        .mm-content {
            padding: 20px 16px;
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .request-origin {
            font-size: 13px;
            color: var(--mm-text-muted);
            text-align: center;
            margin-bottom: 24px;
        }

        .info-box {
            background: var(--mm-bg-hover);
            border: 1px solid var(--mm-border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--mm-text-muted);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .info-value {
            font-size: 14px;
            font-weight: 500;
            word-break: break-all;
        }

        .amount-display {
            text-align: center;
            margin: 24px 0;
        }

        .amount-main {
            font-size: 32px;
            font-weight: 600;
            color: var(--mm-text);
        }

        /* Steps */
        .step { display: none; }
        .step.active { display: block; }

        /* Actions */
        .mm-footer {
            padding: 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--mm-border);
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--mm-blue);
        }

        .btn-cancel {
            background: white;
            color: var(--mm-blue);
        }

        .btn-cancel:hover {
            background: var(--mm-bg-hover);
        }

        .btn-confirm {
            background: var(--mm-blue);
            color: white;
        }

        .btn-confirm:hover {
            background: var(--mm-blue-hover);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Proof Output */
        #proofOutput {
            width: 100%;
            height: 120px;
            font-family: monospace;
            font-size: 11px;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--mm-border);
            background: #fafafa;
            resize: none;
            margin-top: 12px;
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            text-align: center;
            margin-bottom: 16px;
        }
        .status-info { background: #e7f2ff; color: #0376C9; }
        .status-error { background: #fdeaea; color: #d73a49; }
        .status-success { background: #e7fcf3; color: #00d395; }

        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #0376C9;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="mm-window">
        <!-- Header -->
        <div class="mm-header">
            <div style="display: flex; align-items: center;">
                <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M29.5 15.6L16 2.1L2.5 15.6L16 29.1L29.5 15.6Z" fill="#0376C9"/>
                </svg>
                <span style="margin-left: 8px; font-weight: 600; font-size: 14px;">Nexus Pay</span>
            </div>
            <div class="mm-network-badge">
                <div class="network-dot"></div>
                <span id="networkName">Base Sepolia</span>
            </div>
        </div>

        <!-- Account Section -->
        <div class="mm-account-section">
            <div class="identicon"></div>
            <div class="account-label">Nexus User</div>
            <div class="account-address" id="walletAddressDisplay">Not connected</div>
        </div>

        <!-- Content -->
        <div class="mm-content">
            <div id="status" class="status-pill status-info" style="display: none;"></div>

            <!-- Step 1: Connect -->
            <div id="step1" class="step active">
                <h1>Connect Wallet</h1>
                <p class="request-origin">Nexus MCP requires account access</p>
                <div class="info-box" id="paymentInfo" style="display: none;">
                    <div class="info-label">Requesting Service</div>
                    <div class="info-value" id="toolNameDisplay">-</div>
                </div>
            </div>

            <!-- Step 2: Approve -->
            <div id="step2" class="step">
                <h1>Signature Request</h1>
                <p class="request-origin">verify.nexus-mcp.io</p>
                
                <div class="amount-display">
                    <div class="amount-main" id="amountDisplay">0.00 USDC</div>
                </div>

                <div class="info-box">
                    <div class="info-label">Message</div>
                    <div class="info-value" id="descriptionDisplay" style="font-size: 13px;">-</div>
                </div>
                
                <div class="info-box">
                    <div class="info-label">Recipient</div>
                    <div class="info-value" id="recipientDisplay" style="font-size: 11px; color: #555;">-</div>
                </div>
            </div>

            <!-- Step 3: Success / Proof -->
            <div id="step3" class="step">
                <h1>Payment Proof</h1>
                <p class="request-origin">Copy and paste into Claude</p>
                
                <div class="status-pill status-success">✅ Payment successful!</div>
                <textarea id="proofOutput" readonly></textarea>
            </div>
        </div>

        <!-- Footer / Buttons -->
        <div class="mm-footer">
            <button class="btn btn-cancel" id="cancelBtn" onclick="window.close()">Cancel</button>
            
            <button class="btn btn-confirm" id="primaryBtn" onclick="handlePrimaryAction()">
                Connect
            </button>
        </div>
    </div>

    <script>
        const socket = io();
        let paymentData = null;
        let walletAddress = null;
        let provider = null;
        let signer = null;
        let currentStep = 1;

        // Get payment ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('payment');

        // Initialize
        async function init() {
            if (!paymentId) {
                showStatus('info', '🧪 Test mode enabled');
                paymentData = {
                    id: 'test',
                    toolName: 'Nexus AI Tool',
                    amount: '0.10',
                    description: 'Testing the new MetaMask-style UX for payments.',
                    recipient: '0xCE918BbF214E64951B2fFD3c0a895C1411fe3D85',
                    chainId: 84532,
                    token: '0x036CbD53842c5426634e7929541eC2318f3dCF7e'
                };
            } else {
                try {
                    const response = await fetch(`/api/pending-payment/${paymentId}`);
                    paymentData = await response.json();
                    if (paymentData.error) throw new Error(paymentData.error);
                } catch (err) {
                    showStatus('error', '❌ Failed to load payment');
                    return;
                }
            }
            displayPaymentInfo(paymentData);
        }

        function displayPaymentInfo(data) {
            document.getElementById('paymentInfo').style.display = 'block';
            document.getElementById('toolNameDisplay').textContent = data.toolName;
            document.getElementById('descriptionDisplay').textContent = data.description;
            document.getElementById('amountDisplay').textContent = `${data.amount} USDC`;
            document.getElementById('recipientDisplay').textContent = data.recipient;
        }

        async function handlePrimaryAction() {
            if (currentStep === 1) {
                await connectWallet();
            } else if (currentStep === 2) {
                await approvePayment();
            } else if (currentStep === 3) {
                copyProof();
            }
        }

        async function connectWallet() {
            const btn = document.getElementById('primaryBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Connecting...';

            try {
                if (typeof window.ethereum === 'undefined') throw new Error('MetaMask not found');

                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                walletAddress = accounts[0];
                signer = await provider.getSigner();

                // Check network
                const network = await provider.getNetwork();
                const expectedChainId = paymentData.chainId || 84532;
                
                if (Number(network.chainId) !== expectedChainId) {
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: `0x${expectedChainId.toString(16)}` }],
                        });
                    } catch (e) { throw new Error(`Please switch to Chain ID ${expectedChainId}`); }
                }

                // Update UI
                document.getElementById('walletAddressDisplay').textContent = 
                    `${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
                
                showStep(2);
                btn.disabled = false;
                btn.textContent = 'Sign & Confirm';
                showStatus('success', '✅ Wallet connected');
            } catch (err) {
                showStatus('error', `❌ ${err.message}`);
                btn.disabled = false;
                btn.textContent = 'Connect';
            }
        }

        async function approvePayment() {
            const btn = document.getElementById('primaryBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Signing...';

            try {
                // Defensive check to ensure we have valid data
                const amount = String(paymentData.amount || '0.10');
                const token = String(paymentData.token || '0x036CbD53842c5426634e7929541eC2318f3dCF7e');
                const recipient = String(paymentData.recipient || '0xCE918BbF214E64951B2fFD3c0a895C1411fe3D85');
                const chainId = Number(paymentData.chainId || 84532);

                const nonce = Date.now().toString();
                const deadline = Math.floor(Date.now() / 1000) + 600;
                
                // Ensure amount is a valid string for parseUnits
                const amountWei = ethers.parseUnits(amount, 6);

                const domain = {
                    name: 'Permit2',
                    chainId: chainId,
                    verifyingContract: '0x000000000022D473030F116dDEE9F6B43aC78BA3'
                };

                const types = {
                    PermitWitnessTransferFrom: [
                        { name: 'permitted', type: 'TokenPermissions' },
                        { name: 'spender', type: 'address' },
                        { name: 'nonce', type: 'uint256' },
                        { name: 'deadline', type: 'uint256' },
                        { name: 'witness', type: 'PaymentWitness' }
                    ],
                    TokenPermissions: [
                        { name: 'token', type: 'address' },
                        { name: 'amount', type: 'uint256' }
                    ],
                    PaymentWitness: [
                        { name: 'recipient', type: 'address' },
                        { name: 'amount', type: 'uint256' }
                    ]
                };

                const message = {
                    permitted: { token: token, amount: amountWei },
                    spender: recipient,
                    nonce, deadline,
                    witness: { recipient: recipient, amount: amountWei }
                };

                const signature = await signer.signTypedData(domain, types, message);

                const response = await fetch(`/api/approve-payment/${paymentId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ walletAddress, signature, nonce, deadline, amount })
                });

                const result = await response.json();

                if (result.success) {
                    showStep(3);
                    document.getElementById('proofOutput').value = JSON.stringify(result.proof, null, 2);
                    btn.disabled = false;
                    btn.textContent = 'Copy Proof JSON';
                    document.getElementById('cancelBtn').textContent = 'Close';
                } else { throw new Error(result.error); }
            } catch (err) {
                showStatus('error', `❌ ${err.message}`);
                btn.disabled = false;
                btn.textContent = 'Sign & Confirm';
            }
        }

        function copyProof() {
            const textarea = document.getElementById('proofOutput');
            textarea.select();
            document.execCommand('copy');
            showStatus('success', '✅ Copied to clipboard!');
            document.getElementById('primaryBtn').textContent = 'Copied!';
        }

        function showStep(n) {
            currentStep = n;
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${n}`).classList.add('active');
        }

        function showStatus(type, message) {
            const el = document.getElementById('status');
            el.className = `status-pill status-${type}`;
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => { if (el.textContent === message) el.style.display = 'none'; }, 5000);
        }

        socket.on('payment-request', (data) => {
            if (data.id === paymentId) {
                paymentData = data;
                displayPaymentInfo(data);
            }
        });

        window.addEventListener('load', init);
    </script>
</body>
</html>
