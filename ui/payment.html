<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Payment</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "thirdweb": "https://esm.sh/thirdweb@5.119.0",
        "thirdweb/react": "https://esm.sh/thirdweb@5.119.0/react",
        "thirdweb/wallets": "https://esm.sh/thirdweb@5.119.0/wallets",
        "thirdweb/chains": "https://esm.sh/thirdweb@5.119.0/chains"
      }
    }
    </script>
    <style>
        body { margin: 0; font-family: system-ui; }
        #root { max-width: 600px; margin: 50px auto; padding: 20px; }
        .info { background: #f0f0f0; padding: 20px; margin: 20px 0; border-radius: 8px; }
        button { padding: 15px 30px; font-size: 16px; margin: 10px 5px; cursor: pointer; border-radius: 8px; }
        .primary { background: #0070f3; color: white; border: none; }
        .success { background: #0f0; color: #000; }
        .error { color: red; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { createThirdwebClient } from 'thirdweb';
        import { ThirdwebProvider, ConnectButton, useActiveAccount } from 'thirdweb/react';
        import { baseSepolia } from 'thirdweb/chains';

        const { useState, useEffect } = React;

        function PaymentApp() {
            const [config, setConfig] = useState(null);
            const [payment, setPayment] = useState(null);
            const [status, setStatus] = useState('Loading...');
            const [client, setClient] = useState(null);

            const account = useActiveAccount();
            const paymentId = new URLSearchParams(window.location.search).get('payment');

            useEffect(() => {
                if (!paymentId) {
                    setStatus('❌ No payment ID in URL');
                    return;
                }

                Promise.all([
                    fetch('/api/config').then(r => r.json()),
                    fetch(`/api/pending-payment/${paymentId}`).then(r => r.json())
                ]).then(([cfg, pmt]) => {
                    if (pmt.error) {
                        setStatus(`❌ ${pmt.error}`);
                        return;
                    }
                    setConfig(cfg);
                    setPayment(pmt);
                    setClient(createThirdwebClient({ clientId: cfg.thirdwebClientId }));
                    setStatus('');
                }).catch(err => {
                    setStatus(`❌ ${err.message}`);
                });
            }, [paymentId]);

            const approvePayment = async () => {
                if (!account) {
                    setStatus('❌ Please connect wallet first');
                    return;
                }

                setStatus('Processing...');
                try {
                    const res = await fetch(`/api/approve-payment/${paymentId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            walletAddress: account.address,
                            nonce: Date.now().toString(),
                            deadline: Math.floor(Date.now() / 1000) + 300,
                            amount: payment.amount
                        })
                    });

                    const result = await res.json();
                    if (result.success) {
                        setStatus('✅ Payment approved! Closing...');
                        setTimeout(() => window.close(), 2000);
                    } else {
                        setStatus(`❌ ${result.error || 'Failed'}`);
                    }
                } catch (err) {
                    setStatus(`❌ ${err.message}`);
                }
            };

            if (!client) {
                return <div><h1>💳 Payment</h1><p>{status}</p></div>;
            }

            return (
                <ThirdwebProvider>
                    <h1>💳 Payment Required</h1>
                    
                    {payment && (
                        <div className="info">
                            <p><strong>Tool:</strong> {payment.toolName}</p>
                            <p><strong>Amount:</strong> {payment.amount} USDC</p>
                            <p><strong>Description:</strong> {payment.description}</p>
                        </div>
                    )}

                    <div>
                        <h3>Step 1: Connect Wallet</h3>
                        <ConnectButton client={client} chain={baseSepolia} />
                    </div>

                    {account && (
                        <div>
                            <h3>Step 2: Approve Payment</h3>
                            <p>Connected: {account.address.slice(0,6)}...{account.address.slice(-4)}</p>
                            <button className="primary" onClick={approvePayment}>
                                ✅ Approve {payment?.amount} USDC
                            </button>
                        </div>
                    )}

                    {status && <p className={status.includes('✅') ? 'success' : 'error'}>{status}</p>}
                </ThirdwebProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PaymentApp />);
    </script>
</body>
</html>
